<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#050505" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>SGT 8º BAEP - Gestão de Performance</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Montserrat:wght@400;600;800&display=swap');

    :root {
      --bg-body: #050505;
      --primary: #f1f10e; 
      --accent: #8c6a36; 
      --danger: #ff4d4d;
      --success: #00ff6a;
      --text-main: #e0e0e0;
      --border: #2a2a2a;
      --glow: rgba(205, 164, 92, 0.2);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: radial-gradient(circle at top center, #1a1a1a 0%, var(--bg-body) 100%);
      color: var(--text-main);
      margin: 0;
      padding-bottom: 50px;
    }

    .topbar {
      background: rgba(0, 0, 0, 0.95);
      border-bottom: 2px solid var(--accent);
      padding: 15px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(5px);
    }

    .topbar h1 {
      font-family: 'Cinzel', serif;
      margin: 0;
      color: var(--primary);
      letter-spacing: 2px;
      font-size: 1.5rem;
    }

    .container { max-width: 1600px; margin: 20px auto; padding: 0 15px; }

    .card {
      background: #111;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px var(--glow);
    }

    .grid-form {
      display: grid;
      gap: 15px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    label {
      display: block;
      font-size: 0.7rem;
      color: var(--accent);
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      background: #000;
      border: 1px solid var(--border);
      color: #fff;
      border-radius: 5px;
      font-size: 0.85rem;
      font-family: 'Montserrat', sans-serif;
    }

    .btn {
      padding: 12px 25px;
      border: none;
      border-radius: 5px;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .btn-gold {
      background: linear-gradient(45deg, var(--accent), #d4af37);
      color: #000;
      width: 100%;
      margin-top: 15px;
    }

    .btn-green {
      background: #128C7E;
      color: #fff;
      padding: 10px 15px;
      font-size: 0.75rem;
      border-radius: 4px;
    }

    table { width: 100%; border-collapse: collapse; }
    th {
      background: #000;
      color: var(--accent);
      padding: 10px;
      text-align: left;
    }
    td {
      padding: 8px 10px;
      border-bottom: 1px solid #222;
      font-size: 0.85rem;
    }
  </style>
</head>

<body>

<div class="topbar">
  <h1>SGT - 8º BAEP</h1>
</div>

<div class="container">

  <div class="card">
    <h3>Nova Missão</h3>

    <div class="grid-form">
      <div>
        <label>Categoria</label>
        <select id="task-category">
          <option value="PROFISSIONAL">Profissional</option>
          <option value="PESSOAL">Pessoal</option>
        </select>
      </div>

      <div>
        <label>Descrição</label>
        <input type="text" id="task-desc">
      </div>

      <div>
        <label>Executor</label>
        <input type="text" id="task-executor">
      </div>

      <div>
        <label>Prazo</label>
        <input type="date" id="task-deadline">
      </div>
    </div>

    <button class="btn btn-gold" onclick="addTask()">Cadastrar</button>
  </div>

  <div class="card">
    <button class="btn-green" onclick="shareSelected()">Compartilhar WhatsApp</button>

    <table>
      <thead>
        <tr>
          <th></th>
          <th>Status</th>
          <th>Missão</th>
          <th>Executor</th>
          <th>Prazo</th>
        </tr>
      </thead>
      <tbody id="task-list"></tbody>
    </table>
  </div>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

function addTask() {
  const task = {
    id: Date.now(),
    desc: document.getElementById('task-desc').value,
    executor: document.getElementById('task-executor').value,
    deadline: document.getElementById('task-deadline').value,
    status: 'PENDENTE'
  };

  if (!task.desc || !task.deadline) {
    alert("Preencha os campos obrigatórios");
    return;
  }

  tasks.push(task);
  save();
  render();
}

function save() {
  localStorage.setItem('tasks', JSON.stringify(tasks));
}

function render() {
  const list = document.getElementById('task-list');
  list.innerHTML = '';

  tasks.forEach(t => {
    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td><input type="checkbox" value="${t.id}"></td>
      <td>${t.status}</td>
      <td>${t.desc}</td>
      <td>${t.executor}</td>
      <td>${t.deadline}</td>
    `;

    list.appendChild(tr);
  });
}

function shareSelected() {
  const checks = document.querySelectorAll('input[type=checkbox]:checked');

  let msg = "*SGT - MISSÕES*\n\n";

  checks.forEach(c => {
    const t = tasks.find(x => x.id == c.value);
    if (t) {
      msg += `📌 ${t.desc}\n👤 ${t.executor}\n⏳ ${t.deadline}\n\n`;
    }
  });

  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

render();

</script>

</body>
</html>
