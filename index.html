<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#050505" />
  <title>SGT 8º BAEP - Nuvem</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Montserrat:wght@400;600;800&display=swap');

    :root {
      --bg-body: #050505;
      --primary: #f1f10e; 
      --accent: #8c6a36; 
      --text-main: #e0e0e0;
      --border: #2a2a2a;
      --glow: rgba(205, 164, 92, 0.2);
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: radial-gradient(circle at top center, #1a1a1a 0%, var(--bg-body) 100%);
      color: var(--text-main);
      margin: 0;
      padding-bottom: 50px;
    }

    .topbar {
      background: rgba(0, 0, 0, 0.95);
      border-bottom: 2px solid var(--accent);
      padding: 15px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar h1 { font-family: 'Cinzel', serif; margin: 0; color: var(--primary); letter-spacing: 2px; }

    .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }

    .card {
      background: #111;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 4px 15px var(--glow);
    }

    .grid-form {
      display: grid;
      gap: 15px;
      grid-template-columns: 1fr;
    }

    label { display: block; font-size: 0.7rem; color: var(--accent); font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      background: #000;
      border: 1px solid var(--border);
      color: #fff;
      border-radius: 5px;
      font-family: 'Montserrat', sans-serif;
    }

    .btn-gold {
      padding: 15px;
      border: none;
      border-radius: 5px;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      background: linear-gradient(45deg, var(--accent), #d4af37);
      color: #000;
      width: 100%;
      margin-top: 20px;
    }

    .btn-gold:active { transform: scale(0.98); }
  </style>
</head>
<body>

  <div class="topbar">
    <h1>8º BAEP - GESTÃO EFICAZ</h1>
  </div>

  <div class="container">
    <div class="card">
      <form id="formGestao">
        <div class="grid-form">
          <div>
            <label for="titulo">Título da Missão / Tarefa</label>
            <input type="text" id="titulo" placeholder="Ex: Relatório Operacional" required>
          </div>
          
          <div>
            <label for="responsavel">Responsável</label>
            <input type="text" id="responsavel" placeholder="Ex: Cap PM Romão" required>
          </div>

          <div>
            <label for="prioridade">Prioridade</label>
            <select id="prioridade">
              <option value="Baixa">Baixa</option>
              <option value="Média">Média</option>
              <option value="Alta">Alta (Imediata)</option>
            </select>
          </div>

          <div>
            <label for="descricao">Detalhes / Observações</label>
            <textarea id="descricao" rows="4" placeholder="Descreva a tarefa..."></textarea>
          </div>
        </div>

        <button type="submit" class="btn-gold" id="btnSalvar">Salvar na Nuvem</button>
      </form>
    </div>
  </div>

  <script type="module">
    // Importando módulos do Firebase via CDN
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Suas credenciais conforme o print enviado
    const firebaseConfig = {
      apiKey: "AIzaSyD4s0duiFXxsfx4TbCq81XRdbn1t9YD9cM",
      authDomain: "gestao-79d3e.firebaseapp.com",
      projectId: "gestao-79d3e",
      storageBucket: "gestao-79d3e.firebasestorage.app",
      messagingSenderId: "331083428763",
      appId: "1:331083428763:web:2d7a326b06b28747fae73e",
      measurementId: "G-HZTLE9NEX2"
    };

    // Inicialização
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const form = document.getElementById('formGestao');
    const btnSalvar = document.getElementById('btnSalvar');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      btnSalvar.innerText = "Salvando...";
      btnSalvar.disabled = true;

      // Coletando os dados
      const dados = {
        titulo: document.getElementById('titulo').value,
        responsavel: document.getElementById('responsavel').value,
        prioridade: document.getElementById('prioridade').value,
        descricao: document.getElementById('descricao').value,
        dataCriacao: new Date().toLocaleString('pt-BR')
      };

      try {
        // "atividades" é o nome da coleção no Firestore
        await addDoc(collection(db, "atividades"), dados);
        alert("✅ Dados enviados para a nuvem com sucesso!");
        form.reset();
      } catch (error) {
        console.error("Erro ao salvar:", error);
        alert("❌ Erro ao salvar: " + error.message);
      } finally {
        btnSalvar.innerText = "Salvar na Nuvem";
        btnSalvar.disabled = false;
      }
    });
  </script>

</body>
</html>
