<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#050505" />
  <title>SGT 8º BAEP - v6.5</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Montserrat:wght@400;600;800&display=swap');

    :root {
      --bg-body: #050505;
      --primary: #f1f10e; 
      --accent: #8c6a36; 
      --danger: #ff4d4d;
      --success: #00ff6a;
      --text-main: #e0e0e0;
      --border: #2a2a2a;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Montserrat', sans-serif; background: radial-gradient(circle at top center, #1a1a1a 0%, var(--bg-body) 100%); color: var(--text-main); margin: 0; padding-bottom: 50px; }
    
    #notification-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .notification { background: rgba(15, 15, 15, 0.95); border: 1px solid var(--accent); color: #fff; padding: 12px 20px; border-radius: 8px; display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 0.85rem; animation: slideIn 0.3s ease forwards; backdrop-filter: blur(10px); }
    @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .topbar { background: rgba(0, 0, 0, 0.95); border-bottom: 2px solid var(--accent); padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(5px); }
    .topbar h1 { font-family: 'Cinzel', serif; margin: 0; color: var(--primary); letter-spacing: 2px; font-size: 1.4rem; }
    .container { max-width: 1600px; margin: 15px auto; padding: 0 10px; }

    /* DASHBOARD INTERATIVO */
    .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: rgba(17, 17, 17, 0.8); border: 1px solid var(--border); border-left: 4px solid var(--accent); padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; transition: 0.2s; }
    .stat-card:active { transform: scale(0.95); }
    .stat-card.active-filter { border: 1px solid var(--primary); border-left: 4px solid var(--primary); background: rgba(241, 241, 14, 0.05); }
    .stat-card h4 { margin: 0; font-size: 0.6rem; text-transform: uppercase; color: #888; }
    .stat-card .value { font-size: 1.6rem; font-weight: 800; color: var(--primary); font-family: 'Cinzel', serif; margin-top: 5px; }

    .card { background: #111; border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 15px; }
    .grid-form { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); }
    label { display: block; font-size: 0.65rem; color: var(--accent); font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
    input, select, textarea { width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 5px; font-size: 0.8rem; }

    .btn-gold { background: linear-gradient(45deg, var(--accent), #d4af37); color: #000; width: 100%; margin-top: 15px; font-weight: 800; cursor: pointer; border: none; padding: 14px; border-radius: 5px; text-transform: uppercase; }
    
    .search-box { background: #1a1a1a; border: 1px solid var(--accent); padding: 10px; border-radius: 6px; margin-bottom: 15px; display: flex; gap: 8px; align-items: center; }
    .search-box input { background: transparent; border: none; font-size: 0.9rem; color: #fff; outline: none; width: 100%; }

    table { width: 100%; border-collapse: collapse; min-width: 800px; }
    th { background: #000; color: var(--accent); padding: 10px; text-align: left; border-bottom: 2px solid var(--accent); font-size: 0.7rem; text-transform: uppercase; }
    td { padding: 12px 10px; border-bottom: 1px solid #222; font-size: 0.8rem; vertical-align: top;}

    .badge { padding: 3px 6px; border-radius: 3px; font-size: 0.6rem; font-weight: 800; display: inline-block; margin-bottom: 4px; }
    .bg-prof { background: #b08d5733; color: #d4af37; border: 1px solid #d4af37; }
    .bg-pessoal { background: #1a1a1a; color: #888; border: 1px solid #444; }

    /* BOTÕES DE AÇÃO LADO A LADO */
    .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; min-width: 120px; }
    .btn-sm { padding: 8px 4px; border: none; border-radius: 4px; font-size: 0.55rem; font-weight: 800; cursor: pointer; text-transform: uppercase; text-align: center; transition: 0.2s; color: white; }
    .btn-edit { background: #1a3a5a; }
    .btn-wa { background: #128C7E; }
    .btn-del { background: var(--danger); }

    .pri-ALTA { color: var(--danger) !important; font-weight: 800; }
    .pri-MEDIA { color: var(--primary) !important; font-weight: 800; }
    .pri-BAIXA { color: var(--success) !important; font-weight: 800; }

    @media (max-width: 768px) {
      .dashboard { grid-template-columns: 1fr 1fr; }
      table, thead, tbody, th, td, tr { display: block; }
      tr { background: #0a0a0a; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 15px; padding: 12px; }
      td { border: none; padding: 6px 0; border-bottom: 1px dashed #222; position: relative; }
      .action-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 10px; width: 100%; }
      .btn-sm { font-size: 0.65rem; padding: 10px 5px; }
    }
  </style>
</head>
<body>

  <div id="notification-container"></div>

  <div class="topbar">
    <h1>SGT - 8º BAEP</h1>
    <small style="color:var(--success)">Centro de Comando 🟢 v6.5</small>
  </div>

  <div class="container">
    
    <div class="dashboard">
      <div class="stat-card" id="card-total" onclick="setDashFilter('ALL')">
        <h4>Total</h4><div class="value" id="stat-total">0</div>
      </div>
      <div class="stat-card" id="card-pendente" onclick="setDashFilter('PENDENTE')">
        <h4>Pendentes</h4><div class="value" id="stat-pendente">0</div>
      </div>
      <div class="stat-card" id="card-atrasada" onclick="setDashFilter('ATRASADA')">
        <h4 style="color:var(--danger)">Atrasadas</h4><div class="value" id="stat-atrasada" style="color:var(--danger)">0</div>
      </div>
      <div class="stat-card" id="card-feedback" onclick="setDashFilter('FEEDBACK')">
        <h4>Feedbacks</h4><div class="value" id="stat-feedback" style="color: #00c3ff">0</div>
      </div>
    </div>

    <div class="card">
      <h3 style="margin:0 0 15px 0; color:var(--primary); font-family:'Cinzel', serif; font-size: 1.1rem;">Lançar Ordem de Missão</h3>
      <div class="grid-form">
        <div><label>Categoria</label>
          <select id="task-category" onchange="toggleFields()">
            <option value="PROFISSIONAL">Profissional / BAEP</option>
            <option value="PESSOAL">Pessoal / Outros</option>
          </select>
        </div>
        <div><label>Seção Adm</label>
          <select id="task-secao">
            <option value="NENHUMA">NENHUMA</option>
            <option value="P1">P1</option><option value="P2">P2</option><option value="P3">P3</option><option value="P4">P4</option><option value="P5">P5</option><option value="SJD">SJD</option>
          </select>
        </div>
        <div><label>Prioridade</label>
          <select id="task-prioridade">
            <option value="ALTA">🔴 Alta (Urgente)</option>
            <option value="MEDIA" selected>🟡 Média</option>
            <option value="BAIXA">🟢 Baixa (Rotina)</option>
          </select>
        </div>
        <div><label>Superior Direto?</label>
          <select id="task-tem-superior" onchange="toggleFields()">
            <option value="NAO">Não</option><option value="SIM">Sim</option>
          </select>
        </div>
        <div><label id="label-exige-feedback" style="opacity: 0.4;">Exige Retorno?</label>
          <select id="task-exige-feedback" disabled>
            <option value="NAO">Não</option><option value="SIM">Sim</option>
          </select>
        </div>
        <div style="grid-column: 1 / -1;"><label>Missão / Descrição</label><input type="text" id="task-desc" placeholder="Detalhes da missão operacional..."></div>
        <div><label>Executor</label><input type="text" id="task-executor"></div>
        <div><label id="label-superior" style="opacity:0.4">Superior</label><input type="text" id="task-superior" disabled></div>
        <div><label>Início</label><input type="date" id="task-created-at"></div>
        <div><label>Prazo Final</label><input type="date" id="task-deadline"></div>
      </div>
      <button class="btn-gold" onclick="addTask()">Sincronizar Missão</button>
    </div>

    <div class="card">
      <div class="search-box"><span>🔍</span><input type="text" id="search-input" placeholder="Filtrar por missão ou responsável..." onkeyup="render()"></div>
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th style="width: 140px;">Status / PRI</th>
              <th>Missão / Detalhes</th>
              <th style="width: 100px;">Prazo</th>
              <th>Anotações</th>
              <th style="width: 140px;">Comandos</th>
            </tr>
          </thead>
          <tbody id="task-list"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDSTMgiv23oShiOqUkJgvNKU8fOiiZBSR8",
      authDomain: "gestaotarefas-2ac06.firebaseapp.com",
      projectId: "gestaotarefas-2ac06",
      storageBucket: "gestaotarefas-2ac06.firebasestorage.app",
      messagingSenderId: "296776503860",
      appId: "1:296776503860:web:464f213cdcce761e2b3061"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let tasks = [];
    let currentDashFilter = 'ALL';

    function showNotify(msg, type = 'success') {
      const container = document.getElementById('notification-container');
      const toast = document.createElement('div');
      toast.className = `notification ${type}`;
      toast.innerHTML = `<span>${type === 'success' ? '✅' : '⚠️'}</span> ${msg}`;
      container.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 500); }, 3000);
    }

    function formatDataBR(dataISO) {
      if(!dataISO) return "---";
      const [ano, mes, dia] = dataISO.split('-');
      return `${dia}/${mes}/${ano}`;
    }

    db.collection("tarefas").onSnapshot((snapshot) => {
      tasks = [];
      snapshot.forEach((doc) => { let t = doc.data(); t.id = doc.id; tasks.push(t); });
      updateStats();
      render();
    });

    function updateStats() {
      const now = new Date().toISOString().split('T')[0];
      document.getElementById('stat-total').innerText = tasks.length;
      document.getElementById('stat-pendente').innerText = tasks.filter(t => t.status === 'PENDENTE').length;
      document.getElementById('stat-atrasada').innerText = tasks.filter(t => t.end < now && t.status !== 'CONCLUIDO').length;
      document.getElementById('stat-feedback').innerText = tasks.filter(t => t.exigeFeedbackSup === 'SIM' && t.statusFeedbackSup === 'NAO').length;
    }

    function setDashFilter(filter) {
      currentDashFilter = filter;
      document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active-filter'));
      document.getElementById('card-' + filter.toLowerCase()).classList.add('active-filter');
      showNotify("Filtro do Painel: " + filter);
      render();
    }

    function toggleFields() {
      const temSup = document.getElementById('task-tem-superior').value === 'SIM';
      document.getElementById('task-superior').disabled = !temSup;
      document.getElementById('task-exige-feedback').disabled = !temSup;
      document.getElementById('label-superior').style.opacity = temSup ? "1" : "0.4";
      document.getElementById('label-exige-feedback').style.opacity = temSup ? "1" : "0.4";
      document.getElementById('task-secao').disabled = (document.getElementById('task-category').value === 'PESSOAL');
    }

    function addTask() {
      const desc = document.getElementById('task-desc').value;
      const end = document.getElementById('task-deadline').value;
      if(!desc || !end) return showNotify("Missão e Prazo são obrigatórios!", "error");

      const newTask = {
        category: document.getElementById('task-category').value,
        secao: document.getElementById('task-secao').value,
        prioridade: document.getElementById('task-prioridade').value,
        temSuperior: document.getElementById('task-tem-superior').value,
        superior: document.getElementById('task-superior').value || 'N/A',
        exigeFeedbackSup: document.getElementById('task-exige-feedback').value,
        desc: desc, executor: document.getElementById('task-executor').value || 'Não informado',
        start: document.getElementById('task-created-at').value, end: end,
        status: 'PENDENTE', statusFeedbackSup: 'NAO', feedback: '',
        createdAt: new Date().toISOString()
      };

      db.collection("tarefas").add(newTask).then(() => {
        showNotify("Missão Sincronizada!");
        document.getElementById('task-desc').value = '';
      });
    }

    function updateTask(id, field, value) {
      db.collection("tarefas").doc(id).update({ [field]: value }).then(() => showNotify("Sincronizado"));
    }

    function deleteTask(id) {
      if(confirm("Excluir definitivamente?")) db.collection("tarefas").doc(id).delete();
    }

    function sendWA(id) {
      const t = tasks.find(x => x.id === id);
      const prioEmoji = t.prioridade === 'ALTA' ? '🔴 ALTA' : t.prioridade === 'MEDIA' ? '🟡 MÉDIA' : '🟢 BAIXA';
      const msg = encodeURIComponent(
        `🚨 *SGT-8º BAEP | ORDEM DE MISSÃO*\n------------------------------------\n\n` +
        `🏢 *Setor:* ${t.category} | ${t.secao}\n⚡ *Prioridade:* ${prioEmoji}\n\n` +
        `📋 *Missão:* ${t.desc}\n👤 *Responsável:* ${t.executor}\n📅 *Prazo:* ${formatDataBR(t.end)}\n\n` +
        `📊 *Status:* ${t.status === 'CONCLUIDO' ? '✅ CONCLUÍDO' : '⏳ PENDENTE'}\n` +
        `${t.exigeFeedbackSup === 'SIM' ? `🗣️ *Feedback Dado:* ${t.statusFeedbackSup === 'SIM' ? '✅ SIM' : '❌ NÃO'}\n` : ''}`
      );
      window.open(`https://wa.me/?text=${msg}`, '_blank');
    }

    function render() {
      const list = document.getElementById('task-list');
      const searchTerm = document.getElementById('search-input').value.toLowerCase();
      const now = new Date().toISOString().split('T')[0];
      list.innerHTML = '';

      // LOGICA DE FILTRAGEM COMBINADA
      let filtered = tasks.filter(t => {
        const matchSearch = t.desc.toLowerCase().includes(searchTerm) || t.executor.toLowerCase().includes(searchTerm);
        let matchDash = true;
        if(currentDashFilter === 'PENDENTE') matchDash = t.status === 'PENDENTE';
        if(currentDashFilter === 'ATRASADA') matchDash = (t.end < now && t.status !== 'CONCLUIDO');
        if(currentDashFilter === 'FEEDBACK') matchDash = (t.exigeFeedbackSup === 'SIM' && t.statusFeedbackSup === 'NAO');
        return matchSearch && matchDash;
      });

      // ORDENAÇÃO INTELIGENTE (STATUS > PRIORIDADE > DATA)
      filtered.sort((a,b) => {
        if (a.status !== b.status) return a.status === 'PENDENTE' ? -1 : 1;
        const prioMap = { 'ALTA': 3, 'MEDIA': 2, 'BAIXA': 1 };
        if (a.prioridade !== b.prioridade) return prioMap[b.prioridade] - prioMap[a.prioridade];
        return new Date(a.end) - new Date(b.end);
      });

      filtered.forEach(t => {
        const isAtrasada = t.end < now && t.status !== 'CONCLUIDO';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>
            <select onchange="updateTask('${t.id}', 'status', this.value)" style="margin-bottom:4px;">
              <option value="PENDENTE" ${t.status==='PENDENTE'?'selected':''}>⏳ PENDENTE</option>
              <option value="CONCLUIDO" ${t.status==='CONCLUIDO'?'selected':''}>✅ CONCLUÍDO</option>
            </select>
            <select onchange="updateTask('${t.id}', 'prioridade', this.value)" class="pri-${t.prioridade}">
              <option value="ALTA" ${t.prioridade==='ALTA'?'selected':''}>🔴 ALTA</option>
              <option value="MEDIA" ${t.prioridade==='MEDIA'?'selected':''}>🟡 MÉDIA</option>
              <option value="BAIXA" ${t.prioridade==='BAIXA'?'selected':''}>🟢 BAIXA</option>
            </select>
          </td>
          <td>
            <span class="badge ${t.category==='PESSOAL'?'bg-pessoal':'bg-prof'}">${t.category} | ${t.secao}</span>
            <div style="font-weight:800; color:#fff; margin: 4px 0;">${t.desc}</div>
            <div style="font-size:0.7rem; color:var(--primary);">Executor: ${t.executor}</div>
            ${t.exigeFeedbackSup === 'SIM' ? `
              <div style="margin-top:6px;">
                <label style="font-size:0.55rem; color:#888;">FEEDBACK DADO?</label>
                <select onchange="updateTask('${t.id}', 'statusFeedbackSup', this.value)" style="width:auto; height:24px; padding:0 5px; color:${t.statusFeedbackSup==='SIM'?'var(--success)':'var(--danger)'}">
                  <option value="NAO" ${t.statusFeedbackSup==='NAO'?'selected':''}>❌ NÃO</option>
                  <option value="SIM" ${t.statusFeedbackSup==='SIM'?'selected':''}>✅ SIM</option>
                </select>
              </div>
            ` : ''}
          </td>
          <td style="color:${isAtrasada?'var(--danger)':'#fff'}; font-weight:800;">${formatDataBR(t.end)}</td>
          <td><textarea onchange="updateTask('${t.id}', 'feedback', this.value)" placeholder="Anotações...">${t.feedback || ''}</textarea></td>
          <td>
            <div class="action-grid">
              <button class="btn-sm btn-edit" onclick="document.getElementById('task-desc').value='${t.desc}'; document.getElementById('task-executor').value='${t.executor}'; window.scrollTo(0,0); showNotify('Edição habilitada')">EDIT</button>
              <button class="btn-sm btn-wa" onclick="sendWA('${t.id}')">WA</button>
              <button class="btn-sm btn-del" onclick="deleteTask('${t.id}')">EXCL</button>
            </div>
          </td>
        `;
        list.appendChild(tr);
      });
    }
  </script>
</body>
</html>
