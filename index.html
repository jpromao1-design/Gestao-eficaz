<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#050505" />
  <title>SGT 8º BAEP - v6.8</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Montserrat:wght@400;600;800&display=swap');

    :root {
      --bg-body: #050505; --primary: #f1f10e; --accent: #8c6a36; --danger: #ff4d4d; --success: #00ff6a; --text-main: #e0e0e0; --border: #2a2a2a;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Montserrat', sans-serif; background: radial-gradient(circle at top center, #1a1a1a 0%, var(--bg-body) 100%); color: var(--text-main); margin: 0; padding-bottom: 30px; }
    
    #notification-container { position: fixed; top: 15px; right: 15px; z-index: 10001; display: flex; flex-direction: column; gap: 8px; }
    .notification { background: rgba(15, 15, 15, 0.95); border: 1px solid var(--accent); color: #fff; padding: 12px 20px; border-radius: 6px; display: flex; align-items: center; gap: 8px; font-weight: 600; animation: slideIn 0.3s ease forwards; backdrop-filter: blur(10px); }
    @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    .topbar { background: rgba(0, 0, 0, 0.95); border-bottom: 2px solid var(--accent); padding: 15px; text-align: center; position: sticky; top: 0; z-index: 1000; }
    .topbar h1 { font-family: 'Cinzel', serif; margin: 0; color: var(--primary); letter-spacing: 2px; font-size: 1.5rem; }
    .container { max-width: 1600px; margin: 15px auto; padding: 0 20px; }

    /* DASHBOARD */
    .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
    .stat-card { background: rgba(20, 20, 20, 0.9); border: 1px solid var(--border); border-left: 5px solid var(--accent); padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; transition: 0.2s; }
    .stat-card:hover { transform: translateY(-3px); border-color: var(--primary); }
    .stat-card h4 { margin: 0; font-size: 0.7rem; text-transform: uppercase; color: #888; }
    .stat-card .value { font-size: 2.2rem; font-weight: 800; color: var(--primary); font-family: 'Cinzel', serif; margin-top: 5px; }

    .card { background: #111; border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    .grid-form { display: grid; gap: 15px; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
    label { display: block; font-size: 0.7rem; color: var(--accent); font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
    input, select, textarea { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 5px; font-size: 0.9rem; }
    
    .btn-gold { background: linear-gradient(45deg, var(--accent), #d4af37); color: #000; width: 100%; margin-top: 15px; font-weight: 800; cursor: pointer; border: none; padding: 15px; border-radius: 6px; text-transform: uppercase; font-size: 0.9rem; }
    .search-box { background: #1a1a1a; border: 1px solid var(--accent); padding: 12px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
    .search-box input { background: transparent; border: none; font-size: 1rem; color: #fff; outline: none; width: 100%; }

    /* TABELA ADAPTADA PARA COMPUTADOR */
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th { background: #000; color: var(--accent); padding: 15px 10px; text-align: left; font-size: 0.75rem; text-transform: uppercase; border-bottom: 2px solid var(--accent); }
    td { padding: 15px 10px; border-bottom: 1px solid #222; font-size: 0.95rem; vertical-align: top; word-wrap: break-word; }
    tr:hover { background: rgba(255,255,255,0.02); }

    /* LARGURA DAS COLUNAS EM DESKTOP */
    .col-status { width: 160px; }
    .col-missao { width: auto; }
    .col-prazo { width: 120px; }
    .col-notas { width: 30%; }
    .col-acoes { width: 150px; }

    .action-row { display: flex; gap: 5px; }
    .btn-sm { flex: 1; padding: 10px 5px; border: none; border-radius: 4px; font-size: 0.65rem; font-weight: 800; cursor: pointer; text-transform: uppercase; color: white; transition: 0.2s; }
    .btn-edit { background: #1a3a5a; }
    .btn-wa { background: #128C7E; }
    .btn-del { background: var(--danger); }
    .btn-sm:hover { opacity: 0.8; transform: translateY(-1px); }

    .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: 800; display: inline-block; margin-bottom: 5px;}
    .bg-prof { background: rgba(140, 106, 54, 0.2); color: #d4af37; border: 1px solid #d4af37; }

    /* TEXTAREA DE NOTAS MAIOR EM COMPUTADOR */
    td textarea { height: 100px; font-size: 0.85rem; border-color: #333; line-height: 1.4; transition: 0.3s; }
    td textarea:focus { height: 180px; border-color: var(--primary); background: #080808; }

    /* QUICK VIEW MODAL */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; padding: 40px; overflow-y: auto; }
    .modal-content { background: #111; border: 1px solid var(--accent); border-radius: 12px; padding: 25px; max-width: 800px; margin: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 15px; }
    .close-modal { color: var(--danger); font-size: 2rem; cursor: pointer; }
    .modal-item { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--accent); font-size: 1rem; }

    .pri-ALTA { color: var(--danger) !important; font-weight: 800; }
    .pri-MEDIA { color: var(--primary) !important; font-weight: 800; }

    /* AJUSTES PARA CELULAR (PROTOCOLOS MANTIDOS) */
    @media (max-width: 1024px) {
      .container { padding: 0 10px; }
      .dashboard { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .stat-card .value { font-size: 1.4rem; }
      table, thead, tbody, th, td, tr { display: block; }
      th { display: none; }
      tr { background: #0a0a0a; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 15px; padding: 12px; }
      td { border: none; padding: 8px 0; border-bottom: 1px dashed #222; width: 100% !important; }
      td textarea { height: 70px; }
      .action-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
      .btn-sm { font-size: 0.6rem; padding: 12px 2px; }
    }
  </style>
</head>
<body>

  <div id="notification-container"></div>

  <div id="quickview-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header"><h2 id="modal-title" style="margin:0; font-family:'Cinzel'; color:var(--primary); font-size:1.5rem;"></h2><span class="close-modal" onclick="closeQuickView()">&times;</span></div>
      <div id="modal-body"></div>
    </div>
  </div>

  <div class="topbar"><h1>SGT - 8º BAEP</h1><small style="color:var(--success)">Painel Estratégico 🟢 v6.8</small></div>

  <div class="container">
    <div class="dashboard">
      <div class="stat-card" onclick="openQuickView('DELEGADAS')"><h4>Delegadas</h4><div class="value" id="stat-total">0</div></div>
      <div class="stat-card" style="border-left-color:var(--danger)" onclick="openQuickView('ATRASADA')"><h4 style="color:var(--danger)">Atrasadas</h4><div class="value" id="stat-atrasada" style="color:var(--danger)">0</div></div>
      <div class="stat-card" onclick="openQuickView('FEEDBACK')"><h4>Feedback</h4><div class="value" id="stat-feedback" style="color: #00c3ff">0</div></div>
    </div>

    <div class="card">
      <h3 style="margin:0 0 15px 0; color:var(--primary); font-family:'Cinzel', serif; font-size: 1.2rem;">Lançar Ordem de Missão</h3>
      <div class="grid-form">
        <div><label>Categoria</label><select id="task-category" onchange="toggleFields()"><option value="PROFISSIONAL">BAEP</option><option value="PESSOAL">PESSOAL</option></select></div>
        <div><label>Seção</label><select id="task-secao"><option value="NENHUMA">---</option><option value="P1">P1</option><option value="P2">P2</option><option value="P3">P3</option><option value="P4">P4</option><option value="P5">P5</option><option value="SJD">SJD</option></select></div>
        <div><label>Prioridade</label><select id="task-prioridade"><option value="ALTA">🔴 ALTA</option><option value="MEDIA" selected>🟡 MÉDIA</option><option value="BAIXA">🟢 BAIXA</option></select></div>
        <div><label>Superior?</label><select id="task-tem-superior" onchange="toggleFields()"><option value="NAO">Não</option><option value="SIM">Sim</option></select></div>
        <div style="grid-column: 1 / -1;"><label>Missão</label><input type="text" id="task-desc" placeholder="Descreva a missão operacional com clareza..."></div>
        <div><label>Executor</label><input type="text" id="task-executor"></div>
        <div><label>Prazo Final</label><input type="date" id="task-deadline"></div>
        <div id="div-feedback" style="display:none"><label>Exige Retorno?</label><select id="task-exige-feedback"><option value="NAO">Não</option><option value="SIM">Sim</option></select></div>
        <div id="div-superior" style="display:none"><label>Superior Responsável</label><input type="text" id="task-superior"></div>
      </div>
      <button class="btn-gold" onclick="addTask()">Sincronizar Missão na Nuvem</button>
    </div>

    <div class="card">
      <div class="search-box"><span>🔍</span><input type="text" id="search-input" placeholder="Filtrar por qualquer termo da missão ou executor..." onkeyup="render()"></div>
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th class="col-status">Status/PRI</th>
              <th class="col-missao">Missão / Detalhes Operacionais</th>
              <th class="col-prazo">Prazo</th>
              <th class="col-notas">Anotações / Observações</th>
              <th class="col-acoes">Comandos</th>
            </tr>
          </thead>
          <tbody id="task-list"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDSTMgiv23oShiOqUkJgvNKU8fOiiZBSR8",
      authDomain: "gestaotarefas-2ac06.firebaseapp.com",
      projectId: "gestaotarefas-2ac06",
      storageBucket: "gestaotarefas-2ac06.firebasestorage.app",
      messagingSenderId: "296776503860",
      appId: "1:296776503860:web:464f213cdcce761e2b3061"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let tasks = [];

    function showNotify(msg, type='success') {
      const container = document.getElementById('notification-container');
      const toast = document.createElement('div');
      toast.className = `notification ${type}`;
      toast.innerHTML = `<span>${type==='success'?'✅':'⚠️'}</span> ${msg}`;
      container.appendChild(toast);
      setTimeout(() => { toast.style.opacity='0'; setTimeout(()=>toast.remove(), 500); }, 3000);
    }

    function formatDataBR(iso) { if(!iso) return "---"; const [a,m,d] = iso.split('-'); return `${d}/${m}/${a}`; }

    db.collection("tarefas").onSnapshot((snap) => {
      tasks = [];
      snap.forEach(doc => { let t = doc.data(); t.id = doc.id; tasks.push(t); });
      updateStats();
      render();
    });

    function updateStats() {
      const now = new Date().toISOString().split('T')[0];
      document.getElementById('stat-total').innerText = tasks.length;
      document.getElementById('stat-atrasada').innerText = tasks.filter(t=>t.end < now).length;
      document.getElementById('stat-feedback').innerText = tasks.filter(t=>t.exigeFeedbackSup==='SIM' && t.statusFeedbackSup==='NAO').length;
    }

    function toggleFields() {
      const isSup = document.getElementById('task-tem-superior').value === 'SIM';
      document.getElementById('div-feedback').style.display = isSup ? 'block' : 'none';
      document.getElementById('div-superior').style.display = isSup ? 'block' : 'none';
      document.getElementById('task-secao').disabled = (document.getElementById('task-category').value === 'PESSOAL');
    }

    function openQuickView(filter) {
      const now = new Date().toISOString().split('T')[0];
      let filtered = tasks; let title = "Missões Delegadas";
      if(filter==='ATRASADA') { filtered = tasks.filter(t=>t.end < now); title = "⚠️ Missões Atrasadas"; }
      if(filter==='FEEDBACK') { filtered = tasks.filter(t=>t.exigeFeedbackSup==='SIM' && t.statusFeedbackSup==='NAO'); title = "Aguardando Feedback"; }
      document.getElementById('modal-title').innerText = title;
      const body = document.getElementById('modal-body'); body.innerHTML = filtered.length ? '' : '<p style="text-align:center;color:#666;">Nenhuma missão ativa no momento.</p>';
      filtered.sort((a,b)=> new Date(a.end) - new Date(b.end)).forEach(t => {
        body.innerHTML += `<div class="modal-item"><div style="font-weight:800;color:var(--primary);font-size:1.1rem;">${t.desc}</div><div style="font-size:0.8rem;margin-top:8px;">👤 Responsável: ${t.executor} | 🏢 Seção: ${t.secao} | 📅 Prazo: ${formatDataBR(t.end)}</div></div>`;
      });
      document.getElementById('quickview-modal').style.display = 'block';
    }

    function closeQuickView() { document.getElementById('quickview-modal').style.display = 'none'; }

    function addTask() {
      const desc = document.getElementById('task-desc').value;
      const end = document.getElementById('task-deadline').value;
      if(!desc || !end) return showNotify("Missão e Prazo são obrigatórios!", "error");
      const newTask = {
        category: document.getElementById('task-category').value,
        secao: document.getElementById('task-secao').value,
        prioridade: document.getElementById('task-prioridade').value,
        temSuperior: document.getElementById('task-tem-superior').value,
        superior: document.getElementById('task-superior').value || 'N/A',
        exigeFeedbackSup: document.getElementById('task-exige-feedback').value,
        desc, executor: document.getElementById('task-executor').value || 'Cap Romão',
        start: new Date().toISOString().split('T')[0], end,
        status: 'PENDENTE', statusFeedbackSup: 'NAO', feedback: '', createdAt: new Date().toISOString()
      };
      db.collection("tarefas").add(newTask).then(() => { showNotify("Missão Lançada e Sincronizada!"); document.getElementById('task-desc').value = ''; });
    }

    function updateTask(id, field, value) {
      if(field === 'status' && value === 'CONCLUIDO') {
        db.collection("tarefas").doc(id).delete().then(() => showNotify("Missão Concluída e Removida!"));
      } else {
        db.collection("tarefas").doc(id).update({ [field]: value }).then(() => showNotify("Sincronizado com a Nuvem"));
      }
    }

    function sendWA(id) {
      const t = tasks.find(x => x.id === id);
      const prio = t.prioridade === 'ALTA' ? '🔴 ALTA' : t.prioridade === 'MEDIA' ? '🟡 MÉDIA' : '🟢 BAIXA';
      const msg = encodeURIComponent(`🚨 *SGT-8º BAEP | BRIEFING*\n------------------------------------\n\n📋 *Missão:* ${t.desc}\n👤 *Executor:* ${t.executor}\n📅 *Prazo:* ${formatDataBR(t.end)}\n⚡ *PRI:* ${prio}`);
      window.open(`https://wa.me/?text=${msg}`, '_blank');
    }

    function render() {
      const list = document.getElementById('task-list'); const search = document.getElementById('search-input').value.toLowerCase();
      const now = new Date().toISOString().split('T')[0]; list.innerHTML = '';
      let filtered = tasks.filter(t => t.desc.toLowerCase().includes(search) || t.executor.toLowerCase().includes(search));
      filtered.sort((a,b) => {
        const pMap = { 'ALTA': 3, 'MEDIA': 2, 'BAIXA': 1 };
        if (a.prioridade !== b.prioridade) return pMap[b.prioridade] - pMap[a.prioridade];
        return new Date(a.end) - new Date(b.end);
      });
      filtered.forEach(t => {
        const isAtrasada = t.end < now;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>
            <select onchange="updateTask('${t.id}', 'status', this.value)" style="margin-bottom:5px;"><option value="PENDENTE" selected>⏳ PENDENTE</option><option value="CONCLUIDO">✅ CONCLUÍDO</option></select>
            <select onchange="updateTask('${t.id}', 'prioridade', this.value)" class="pri-${t.prioridade}"><option value="ALTA" ${t.prioridade==='ALTA'?'selected':''}>🔴 ALTA</option><option value="MEDIA" ${t.prioridade==='MEDIA'?'selected':''}>🟡 MÉDIA</option><option value="BAIXA" ${t.prioridade==='BAIXA'?'selected':''}>🟢 BAIXA</option></select>
          </td>
          <td>
            <span class="badge bg-prof">${t.secao}</span>
            <div style="font-weight:800;color:#fff;margin:4px 0; font-size:1.1rem;">${t.desc}</div>
            <div style="font-size:0.75rem;color:var(--primary); font-weight:600;">Responsável: ${t.executor}</div>
            ${t.exigeFeedbackSup==='SIM'?`
              <div style="margin-top:8px;font-size:0.7rem;">FEEDBACK DADO? 
              <select onchange="updateTask('${t.id}', 'statusFeedbackSup', this.value)" style="width:auto;height:24px;padding:0 5px;color:${t.statusFeedbackSup==='SIM'?'var(--success)':'var(--danger)'}">
                <option value="NAO" ${t.statusFeedbackSup==='NAO'?'selected':''}>NÃO</option><option value="SIM" ${t.statusFeedbackSup==='SIM'?'selected':''}>SIM</option>
              </select></div>`:''}
          </td>
          <td style="color:${isAtrasada?'var(--danger)':'#fff'};font-weight:800; font-size: 1.1rem;">${formatDataBR(t.end)}</td>
          <td><textarea onchange="updateTask('${t.id}', 'feedback', this.value)" placeholder="Insira aqui as notas, andamentos ou atualizações da missão...">${t.feedback || ''}</textarea></td>
          <td><div class="action-row">
            <button class="btn-sm btn-edit" onclick="document.getElementById('task-desc').value='${t.desc}';document.getElementById('task-executor').value='${t.executor}';window.scrollTo(0,0);">EDIT</button>
            <button class="btn-sm btn-wa" onclick="sendWA('${t.id}')">WA</button>
            <button class="btn-sm btn-del" onclick="if(confirm('Excluir?'))db.collection('tarefas').doc('${t.id}').delete()">DEL</button>
          </div></td>`;
        list.appendChild(tr);
      });
    }
  </script>
</body>
</html>
